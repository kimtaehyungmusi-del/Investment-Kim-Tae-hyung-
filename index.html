<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hwarang Capital</title>
<style>
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #0a0f1c;
    color: #fff;
    margin: 0;
    padding: 0;
  }

  header {
    background: #111827;
    padding: 20px;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
    letter-spacing: 1px;
  }

  .container {
    padding: 30px;
    text-align: center;
  }

  .card {
    background: #1f2937;
    padding: 25px;
    border-radius: 15px;
    max-width: 350px;
    margin: auto;
    box-shadow: 0 0 15px rgba(0,0,0,0.6);
  }

  .balance {
    font-size: 26px;
    margin: 15px 0;
    color: #00ffcc;
  }

  .locked {
    color: #ff4d4d;
    font-size: 14px;
  }

  button {
    margin-top: 10px;
    padding: 10px 15px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #facc15;
    font-weight: bold;
  }

  .lang-switch {
    margin-top: 20px;
  }

  footer {
    margin-top: 40px;
    font-size: 12px;
    color: #aaa;
  }
</style>

<script>
function setLang(lang) {
  if (lang === "en") {
    document.getElementById("greet").innerText = "Hi Charial";
    document.getElementById("balance").innerText = "$100,000.00";
    document.getElementById("locked").innerText = "Funds locked to: Kim";
    document.getElementById("note").innerText = "Demo interface only. No real financial services.";
  } else {
    document.getElementById("greet").innerText = "안녕하세요 Charial";
    document.getElementById("balance").innerText = "₩100,000";
    document.getElementById("locked").innerText = "자금 잠금 대상: Kim";
    document.getElementById("note").innerText = "이것은 데모 인터페이스입니다. 실제 금융 서비스가 아닙니다.";
  }
}
</script>

</head>

<body>

<header>
  HWARANG CAPITAL (화랑 캐피탈)
</header>

<div class="container">

  <div class="card">
    <h2 id="greet">Hi Charial</h2>
    <div class="balance" id="balance">$100,000.00</div>
    <div class="locked" id="locked">Funds locked to: Kim</div>
  </div>

  <div class="lang-switch">
    <button onclick="setLang('en')">English</button>
    <button onclick="setLang('kr')">한국어</button>
  </div>

  <footer id="note">
    Demo interface only. No real financial services.
  </footer>

</div>

</body>
</html>
