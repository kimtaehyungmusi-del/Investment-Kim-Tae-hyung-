<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hwarang Capital</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0a0f1c;
  color: white;
}

header {
  background: #111827;
  padding: 15px;
  text-align: center;
  font-weight: bold;
  font-size: 20px;
}

/* Military Banner */
.banner {
  background: url('https://images.unsplash.com/photo-1601597111158-2fceff292cdc') no-repeat center/cover;
  padding: 60px 20px;
  text-align: center;
}

.banner h2 {
  background: rgba(0,0,0,0.6);
  display: inline-block;
  padding: 10px;
  border-radius: 8px;
}

.card {
  background: #1f2937;
  margin: 20px;
  padding: 20px;
  border-radius: 12px;
  text-align: center;
}

.balance {
  font-size: 26px;
  color: #00ffcc;
}

.locked {
  color: red;
}

button {
  padding: 10px;
  margin: 5px;
  border: none;
  background: gold;
  border-radius: 6px;
  cursor: pointer;
}

.section {
  padding: 20px;
}

.feature {
  background: #111827;
  margin: 10px;
  padding: 15px;
  border-radius: 10px;
  cursor: pointer;
}

.feature:hover {
  background: #1f2937;
}

footer {
  text-align: center;
  padding: 20px;
  font-size: 12px;
  color: gray;
}
</style>

<script>
let currentLang = "en";

function setLang(lang) {
  currentLang = lang;

  if (lang === "en") {
    document.getElementById("greet").innerText = "Hi Charial";
    document.getElementById("balance").innerText = "$100,000.00";
    document.getElementById("locked").innerText = "Funds locked to: Kim";
    document.getElementById("demo").innerText = "Demo only - No real transactions";
  } else {
    document.getElementById("greet").innerText = "안녕하세요 Charial";
    document.getElementById("balance").innerText = "₩100,000";
    document.getElementById("locked").innerText = "자금 잠금 대상: Kim";
    document.getElementById("demo").innerText = "데모 전용 - 실제 거래 없음";
  }
}

function deposit() {
  alert(currentLang === "en" ? "Awaiting payment" : "결제 대기 중");
}

function withdraw() {
  alert(currentLang === "en" ? "Invest first" : "먼저 투자하세요");
}

function clickFeature(name) {
  alert(name + " coming soon!");
}
</script>

</head>

<body>

<header>
  HWARANG CAPITAL (화랑 캐피탈)
</header>

<!-- Military Banner -->
<div class="banner">
  <h2>Strength. Discipline. Growth.</h2>
</div>

<!-- Account -->
<div class="card">
  <h2 id="greet">Hi Charial</h2>
  <div class="balance" id="balance">$100,000.00</div>
  <div class="locked" id="locked">Funds locked to: Kim</div>

  <button onclick="deposit()">Deposit</button>
  <button onclick="withdraw()">Withdraw</button>
</div>

<!-- Language -->
<div style="text-align:center;">
  <button onclick="setLang('en')">English</button>
  <button onclick="setLang('kr')">한국어</button>
</div>

<!-- Features -->
<div class="section">
  <h3>Services</h3>

  <div class="feature" onclick="clickFeature('Investment Plans')">Investment Plans</div>
  <div class="feature" onclick="clickFeature('Loan Services')">Loan Services</div>
  <div class="feature" onclick="clickFeature('Crypto Trading')">Crypto Trading</div>
</div>

<!-- Sponsored Military Image -->
<div class="section">
  <h3>Sponsored</h3>
  <img src="https://images.unsplash.com/photo-1581090700227-4c4d2a7b9d0f"
       style="width:100%;border-radius:10px;">
</div>

<footer id="demo">
  South Korea - Military Investment 
</footer>

</body>
</html>
